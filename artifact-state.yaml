version: 1

governance:
  owner: repository-operator
  review_cadence: quarterly
  next_review: 2026-10-01
  expansion_rule: Add a blocking declaration only for a consequential, recurring, objectively detectable failure.
  retirement_rule: Remove or narrow controls whose false positives, maintenance cost, or blocked legitimate work exceed demonstrated benefit.

exceptions: []

# This curated manifest governs consequential artifact roles. Paths may describe
# external operator-controlled storage; validation inspects declarations, not data.
artifacts:
  ai-ceo-authority-envelope:
    path: authority-envelope.yaml
    operation: Define durable, reviewed authority domains and prohibitions for the Anyang AI CEO.
    domain: governance
    authority: canonical
    data_class: public
    provenance:
      sources: [operator-governance]
      origin: Human-reviewed authority contract for Anyang Intelligence.
    mutability:
      method: Reviewed operator change followed by authority validation.
      writers: [repository-operator]
      direct_edit: reviewed-only
    recovery:
      method: Restore the last reviewed Git version and rerun authority validation.
      verification: [authority-schema-check, prohibition-check]
    git:
      tracked: true

  epistemic-state-contract:
    path: epistemic-state.yaml
    operation: Bind consequential repository surfaces to claim identity, state, provenance, dependencies, review triggers, and approval posture.
    domain: epistemic-governance
    authority: canonical
    data_class: public
    provenance:
      sources: [operating-ledger]
      origin: Human-reviewed repository governance under docs/epistemic-constitution.md.
    mutability:
      method: Reviewed manifest changes followed by epistemic validation and control review.
      writers: [repository-operator]
      direct_edit: reviewed-only
    recovery:
      method: Restore the last reviewed Git version and rerun the epistemic validator.
      verification: [epistemic-schema-check, critical-gap-check, human-cohort-check]
    git:
      tracked: true

  operating-ledger:
    path: "${ANYANG_DATA_DIR}/anyang-operating-ledger.db"
    operation: Record accepted tenants, claims, work, evidence, approvals, outcomes, and cadence events.
    domain: operating-state
    authority: canonical
    data_class: tenant-private
    provenance:
      schema: cli/anyang_loop/ops_db.py
      origin: Governed anyang-ops commands and approved migrations.
    mutability:
      method: Transactional writes through anyang-ops and approved schema migration code.
      writers: [anyang-ops, approved-migration]
      direct_edit: prohibited
    recovery:
      method: Restore an operator-approved encrypted SQLite-safe backup.
      verification: [sqlite-integrity-check, schema-version-check, recent-event-reconciliation]
    git:
      tracked: false

  operating-review:
    path: generated-reviews/*.md
    operation: Expose a human-readable review of governed operating state.
    domain: operating-review
    authority: derived
    data_class: tenant-private
    provenance:
      sources: [operating-ledger]
      origin: anyang-ops review weekly
      as_of_required: true
    mutability:
      method: Regenerate from the ledger; do not edit as a peer record.
      writers: [anyang-ops]
      direct_edit: prohibited
    recovery:
      method: Regenerate from the restored operating ledger.
      verification: [source-tenant-check, as-of-check, review-regeneration]
    git:
      tracked: false

  finance-source-snapshot:
    path: finance/anyang-intelligence-ledger.csv
    operation: Preserve the imported financial source snapshot for traceability and reconciliation.
    domain: finance-source
    authority: evidentiary
    data_class: internal-sensitive
    provenance:
      origin: Original internal finance source capture retained without silent overwrite.
    mutability:
      method: Preserve immutably; corrections enter a new reviewed artifact.
      writers: [authorized-finance-operator]
      direct_edit: prohibited
    recovery:
      method: Restore the checksum-verified source capture from approved internal storage.
      verification: [checksum-check, row-identifier-check, source-date-check]
    git:
      tracked: false

  finance-ledger:
    path: finance/anyang-intelligence-ledger.xlsx
    operation: Support bounded human reconciliation and approval of internal financial records.
    domain: finance-ledger
    authority: provisional
    data_class: internal-sensitive
    provenance:
      sources: [finance-source-snapshot]
      origin: Human-reviewed reconciliation workbook.
    mutability:
      method: Reviewed workbook edits by the designated finance operator.
      writers: [authorized-finance-operator]
      direct_edit: reviewed-only
    recovery:
      method: Restore the last approved workbook version and reconcile subsequent source records.
      verification: [formula-check, source-link-check, reconciliation-status-check]
    git:
      tracked: false

  singularity-transcript-manifest:
    path: projects/singularity-science/archive/transcript-intake-manifest*.json
    operation: Declare an operator-selected batch of transcript sources and intake metadata.
    domain: singularity-transcript-intake
    authority: evidentiary
    data_class: internal-sanitized
    provenance:
      origin: Operator-selected manifest; canonical only for the invocation that names it explicitly.
    mutability:
      method: Reviewed manifest edits before invoking the bounded transcript-intake capability.
      writers: [repository-operator]
      direct_edit: reviewed-only
    recovery:
      method: Restore the reviewed manifest or reconstruct it from approved source references.
      verification: [manifest-schema-check, source-reference-check, rights-status-check]
    git:
      tracked: true

  singularity-transcript-source-bodies:
    path: manifest-referenced external transcript bodies
    operation: Supply source text to the bounded transcript-intake capability.
    domain: singularity-transcript-sources
    authority: evidentiary
    data_class: external-operator-controlled
    provenance:
      origin: Files explicitly referenced by the invoked transcript manifest.
    mutability:
      method: Source bodies remain outside the capability's write authority.
      writers: [source-owner, repository-operator]
      direct_edit: outside-phase
    recovery:
      method: Restore from the operator-approved source location.
      verification: [source-presence-check, encoding-check, rights-status-check]
    git:
      tracked: false

  singularity-transcript-archive:
    path: projects/singularity-science/archive/*/transcripts/*.md
    operation: Preserve normalized internal transcript source material with attribution and rights metadata.
    domain: singularity-transcript-archive
    authority: evidentiary
    data_class: internal-source
    provenance:
      sources: [singularity-transcript-manifest, singularity-transcript-source-bodies]
      origin: anyang-project import-transcripts
    mutability:
      method: Create through the bounded import capability; never overwrite an existing destination silently.
      writers: [anyang-project-import-transcripts]
      direct_edit: prohibited
    recovery:
      method: Reconcile the invoked manifest with existing destinations and rerun the bounded importer.
      verification: [destination-content-check, manifest-reconciliation, privacy-check]
    git:
      tracked: true

  singularity-transcript-import-ledger:
    path: projects/singularity-science/archive/transcript-import-ledger.md
    operation: Expose the terminal intake status of rows in the invoked manifest.
    domain: singularity-transcript-import-review
    authority: derived
    data_class: internal-sanitized
    provenance:
      sources: [singularity-transcript-manifest, singularity-transcript-archive]
      origin: anyang-project import-transcripts
    mutability:
      method: Regenerate from the invoked manifest and reconciled archive destinations.
      writers: [anyang-project-import-transcripts]
      direct_edit: prohibited
    recovery:
      method: Regenerate after manifest-to-archive reconciliation.
      verification: [manifest-reconciliation, destination-content-check, repo-relative-provenance-check]
    git:
      tracked: true
