name: non-profit-board-and-stewardship-review
description: Governance loop that turns a donor, grant, report, program, or asset issue into a clear review packet, hold decision, or board/professional escalation.
loop_type: governance
customer_lane: non-profit
authority: leadership or board approval
tags:
  - mission
  - donor
  - board
  - stewardship
signal: A donor, grant, reporting, restricted-fund, program, or real estate stewardship issue needs structured review.
memory_objects:
  - mission priorities
  - donor and grant notes
  - reporting deadlines
  - restrictions or obligations
  - asset stewardship questions
  - board review needs
decision: Leadership or board authority decides whether the issue should be handled through normal stewardship, revised for stronger evidence, held pending clarification, or escalated to board or professional review.
action: Leadership staff updates the stewardship plan, revises the reporting or decision packet, records the risk, or prepares board-review or professional-review questions for explicit human review.
evidence: Review packet, donor or grant follow-up note, revised claim, board memo draft, risk note, or explicit hold decision.
cadence: Monthly operating review and event-driven review before major donor, grant, reporting, or asset decisions.
learning_update: Preserve the decision path, evidence quality, and recurring governance failure modes in stewardship memory, then tighten recurring review surfaces when deadline pressure, weak claims, or governance drift repeat.
governance_boundary: Non-Profit may finish review-packet preparation, evidence triage, and hold-or-escalate recommendations without interruption, but donor commitments, restricted-fund decisions, board actions, legal/compliance positions, and external impact claims must always return for explicit human approval.
