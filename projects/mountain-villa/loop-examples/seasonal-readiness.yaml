name: mountain-villa-seasonal-readiness
description: Seasonal property risk and readiness loop for Mountain Villa.
loop_type: governance
project_lane: mountain-villa
authority: owner approval
tags:
  - property
  - risk
  - seasonal
  - retreat-readiness
signal: Seasonal transition, maintenance issue, safety concern, weather risk, access constraint, retreat-readiness opportunity, or owner review window.
memory_objects:
  - property risk register
  - maintenance tasks
  - seasonal readiness checklist
  - access constraints
  - insurance or safety questions
  - retreat-readiness checklist
  - owner decisions
decision: Prepare a risk-ranked recommendation for mitigation, monitoring, professional review, owner decision, or a secondary retreat-readiness improvement.
action: After owner approval, schedule maintenance, update readiness tasks, collect proof, prepare professional-review questions, or plan a retreat-readiness improvement.
evidence: Risk register update, proof photo, invoice, inspection note, owner approval, or completed maintenance record.
cadence: Seasonal review, weekly review during active risk windows, and event-driven review for safety or access issues.
learning_update: Update the readiness checklist and risk memory based on what prevented drift, damage, delay, or avoidable uncertainty; record which comfort, presentation, landscape, or amenity improvements mattered only after foundational risk work was protected.
governance_boundary: The Executive OS may finish risk ranking, proof planning, mitigation-versus-escalation preparation, and retreat-readiness planning without interruption, but property access, guest use, rentals, spending, insurance claims, legal positions, safety decisions, and contractor commitments must always return to owner or professional review.
