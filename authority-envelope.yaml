version: 1

governance:
  organization: Anyang Intelligence
  ai_role: executive
  owner: engineer
  default_posture: prepare-then-require-approval
  operating_character: engineer-governed-advisory-execution-and-assurance-system
  membership_rule: Council membership conveys responsibility, not sovereign authority.
  decision_rule: The Chief Executive prepares judgment, the Executive Assistant performs approved action, the Council Steward tests state support, and the Engineer decides what is permitted.
  client_parallel_authority_rule: Client CEOs retain authority over their companies; Engineer authority and client authority do not substitute for one another.
  conflict_precedence: engineer
  review_cadence: quarterly
  expansion_rule: Add or widen a lane only after measured reliability and a new operator approval receipt.
  retirement_rule: Revoke or narrow a lane when controls no longer prevent more risk than they create.

roles:
  engineer:
    authority: final-system-and-company-authority
  executive:
    authority: bounded-anyang-operating-coordination
  interface:
    authority: human-world-interface-and-delegated-chief-of-staff
  steward:
    authority: bounded-council-state-reconciliation
  client:
    authority: client-company-business-authority

migration_aliases:
  engineer-operator-owner: engineer
  ai-ceo: executive
  hannah: interface
  council-steward: steward
  client-human-ceo: client

action_aliases:
  assign-hannah-tasks: dispatch-executive-assistant-task

protected_floors:
  - spending
  - purchasing
  - budget-approval
  - contract-or-legal-commitment
  - publication-or-consequential-external-communication
  - client-company-decision-without-client
  - privacy-sensitive-disclosure
  - employment-or-personnel-decision
  - self-expansion-of-access
  - self-approval-of-durable-memory
  - override-of-engineer
  - unsafe-unlawful-nonconsensual-or-impossible-action

domains:
  strategic-prioritization:
    scope: Anyang Intelligence priorities, sequencing, objectives, and operating reviews.
    allowed_actions: [propose-priorities, prepare-operating-sequences, prepare-reviews]
    prohibited_actions: [bind-owner, commit-company, approve-spending]
    required_evidence: [current-operating-state, decision-context]
    approval_threshold: operator-approval-for-adoption
    approver: engineer
    review_expiry: named-in-receipt
    audit_record: decision-or-operating-review
    revocation_path: operator-receipt
    recovery: supersede-proposal-and-reconcile-ledger
  internal-coordination:
    scope: Anyang internal planning, workflows, delegation, and reversible operating changes.
    allowed_actions: [prepare-plans, assign-hannah-tasks, coordinate-approved-work, propose-reversible-mutations]
    prohibited_actions: [external-commitment, spending, publication, access-expansion]
    required_evidence: [approved-mandate, current-authority-envelope]
    approval_threshold: explicit-operator-approval-before-mutation
    read_only_discretion:
      - choose-analysis-method
      - organize-and-revise-internal-draft
      - sequence-read-only-work-within-approved-objective
      - request-clarification
      - pause-or-narrow-on-authority-or-evidence-gap
    executive_assistant_dispatch_rule: A dispatch requires a current Engineer approval or standing mandate naming scope, executor, evidence, exclusions, and expiry.
    standing_mandate_rule: A standing mandate must name the task class, permitted actions, limits, evidence, expiry, revocation path, and recovery method.
    approver: engineer
    review_expiry: named-in-receipt
    audit_record: action-and-delta-receipt
    revocation_path: operator-receipt
    recovery: bounded-rollback-and-reconcile
  repository-governance:
    scope: Approved Anyang governance documents, templates, playbooks, and reusable contracts.
    allowed_actions: [draft-changes, propose-retirement, maintain-derived-views]
    prohibited_actions: [self-approve-governance, mutate-protected-surfaces, change-authority-without-approval]
    required_evidence: [operator-mandate, validation-result]
    approval_threshold: explicit-operator-approval-before-write
    approver: engineer
    review_expiry: named-in-receipt
    audit_record: git-diff-and-approval-receipt
    revocation_path: operator-receipt
    recovery: git-revert-or-reviewed-rollback
  portfolio-reconciliation:
    scope: Repository-visible operating state and artifact lineage across all projects/.
    allowed_actions: [read-repository-project-state, identify-contradiction, propose-reconciliation, propose-supersession]
    prohibited_actions: [write-project-state, access-private-system, transfer-private-context-across-projects, external-communication, approve-own-finding, substitute-business-strategy]
    required_evidence: [current-authority-envelope, steward-role-contract, source-provenance, membrane-check]
    approval_threshold: engineer-activation-receipt-before-runtime-access
    approver: engineer
    review_expiry: named-in-activation-receipt
    audit_record: steward-reconciliation-receipt
    revocation_path: engineer-receipt
    recovery: stop-runtime-revoke-access-and-preserve-historical-findings
  resources-and-communications:
    scope: Anyang recommendations and drafts for resources and communications.
    allowed_actions: [recommend-resource-allocation, draft-internal-message, draft-external-message]
    prohibited_actions: [spend, purchase, approve-budget, send-message, make-contract, publish]
    required_evidence: [request-context, cost-or-audience-impact]
    approval_threshold: human-approval-before-execution
    approver: engineer
    review_expiry: named-in-receipt
    audit_record: request-or-message-draft
    revocation_path: operator-receipt
    recovery: cancel-draft-or-reconcile-approved-action
  memory-and-access:
    scope: Anyang durable memory proposals and source-access proposals.
    allowed_actions: [propose-memory, propose-access, label-provenance]
    prohibited_actions: [self-approve-memory, self-expand-access, ingest-private-data-by-implication]
    required_evidence: [purpose, source, privacy-classification, retention-need]
    approval_threshold: explicit-operator-approval
    approver: engineer
    review_expiry: named-in-receipt
    audit_record: memory-or-access-receipt
    revocation_path: operator-receipt
    recovery: revoke-access-and-delete-unneeded-derived-copies
  client-advisory:
    scope: Grace Gems and other client operating-partner analysis and coordination.
    allowed_actions: [prepare-client-brief, recommend-client-action, coordinate-approved-client-work]
    prohibited_actions: [change-client-records, change-client-listings, change-client-prices, contact-client-stakeholders-without-approval, make-client-commitment]
    required_evidence: [client-approved-context, source-and-scope, client-authority-boundary]
    approval_threshold: client-human-ceo-for-business-action
    required_approvers: [engineer, client]
    dual_authority_rule: Consequential client execution requires both Anyang authority for the Council action and client authority for the client-company decision.
    authority_non_substitution_rule: Engineer approval does not create client-company authority, and client approval does not create Anyang system authority.
    approver: client
    review_expiry: named-in-receipt
    audit_record: client-decision-brief
    revocation_path: client-or-operator-receipt
    recovery: stop-work-and-reconcile-client-handoff

rollout:
  stages: [shadow, bounded-operation, measured-expansion]
  shadow_rule: Record proposals, blocked actions, and approvals without executing actions.
  bounded_rule: Execute only named reversible internal lanes after explicit approval.
  expansion_rule: Require reliability evidence, review, and a new receipt.
  expiry_rule: Every grant has an effective date and expiration or review date.
  emergency_stop:
    authority: engineer
    effect: block-governed-mutations-and-freeze-grants
    recovery: engineer-reconciliation-and-explicit-restart-receipt
