name: elementary-learning-experience
description: Parent-reviewed learning experience loop for an elementary learner.
loop_type: operating
customer_lane: elementary-school
authority: parent or guardian approval
tags:
  - learning
  - child-safety
signal: Learner interest, friction, question, parent goal, portfolio evidence, or weekly learning review.
memory_objects:
  - learner profile
  - parent goals
  - curriculum choices
  - daily learning plan
  - portfolio artifacts
  - progress evidence
  - parent decisions
decision: Prepare a parent-reviewed recommendation for the next lesson, project, reading, practice, or support need.
action: After parent or guardian approval, update the learning plan and run the selected learning experience.
evidence: Parent approval, portfolio artifact, progress note, learner reflection, monthly portfolio review, or saved work sample.
cadence: Daily learning rhythm, weekly parent review, monthly portfolio review, and event-driven review for safety or support concerns.
learning_update: Preserve observations in learner memory and adjust the next plan based on evidence, curiosity, resistance, and parent judgment.
governance_boundary: The system may not replace parent authority, diagnose a child, make legal or medical determinations, hide concerns, or expose sensitive child information.

