version: 1

governance:
  owner: accountable-publication-reviewer
  review_cadence: quarterly
  next_review: 2026-10-01
  expansion_rule: Expand only when reader-outcome evidence shows lower semantic entropy or a recurring objective failure.
  retirement_rule: Narrow or remove checks that create formulaic overrides without improving retrieval, recall, or decision quality.

exceptions: []

defaults:
  document_type: reader-facing
  template: true
  require_title_rationale: true
  require_lead_judgment: true
  require_controlling_object: true
  require_uncertainty: true
  require_forecast: false
  require_deliberative_questions: false

documents:
  - path: templates/operating-review.md
    require_deliberative_questions: true
  - path: playbooks/decision-memo.md
    require_deliberative_questions: true
  - path: projects/singularity-science/templates/china-humanoid-quarterly-watch-template.md
    document_type: forecast-template
    require_forecast: true
    require_deliberative_questions: true
  - path: projects/singularity-science/2026-q1-china-humanoid-market-watch.md
    document_type: quarterly-watch
    template: false
  - path: projects/singularity-science/2026-q2-china-humanoid-market-watch.md
    document_type: quarterly-watch
    template: false
  - path: projects/singularity-science/china-humanoid-market-watch.md
    document_type: watch-contract
    template: false
  - path: projects/singularity-science/primitives/embodied-agency-adoption-gate.md
    document_type: adoption-gate
    template: false
  - path: projects/singularity-science/archive/*/analysis-template.md
    document_type: analysis-template

exemptions:
  - projects/singularity-science/archive/**/transcripts/**
  - projects/singularity-science/archive/**/source-notes/**
  - projects/singularity-science/archive/**/*manifest*.json
  - migration-backups/**
  - strategy_codex_probe/**
  - tenant-private/**
